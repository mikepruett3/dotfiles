---

- name: "Install Visual Studio Code (paru)"
  ansible.builtin.shell:
    cmd: paru -S --needed --noconfirm --noprogressbar visual-studio-code-bin
  become: yes
  become_user: "{{ ansible_facts['user_id'] }}"
  when:
    - desktop is defined
    - aur_helper == 'paru'

